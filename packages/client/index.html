<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#1a3d6e" />

  <!-- Apple PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Pyrgo Soccer" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />

  <!-- SEO -->
  <title>Pyrgo Soccer — Play Head-to-Head Soccer Online</title>
  <meta name="description" content="Fast-paced head-to-head soccer game. Play VS CPU, local multiplayer, or online with friends. Create custom players and share them!" />

  <!-- Open Graph -->
  <meta property="og:title" content="Pyrgo Soccer — Play Head-to-Head Soccer Online" />
  <meta property="og:description" content="Fast-paced head-to-head soccer game. Play VS CPU, local multiplayer, or online with friends." />
  <meta property="og:image" content="/og-image.png" />
  <meta property="og:type" content="website" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Pyrgo Soccer" />
  <meta name="twitter:description" content="Fast-paced head-to-head soccer game. Play VS CPU, local multiplayer, or online with friends." />
  <meta name="twitter:image" content="/og-image.png" />

  <!-- Cache control -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <!-- CSP for static deploy -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' ws: wss: http: https:; img-src 'self' data: blob:; font-src 'self'; media-src 'self' blob:;" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden; background: #1a3d6e;
      touch-action: none;
      -webkit-user-select: none; user-select: none;
    }
    #game-container {
      position: fixed;
      top: env(safe-area-inset-top, 0px);
      left: env(safe-area-inset-left, 0px);
      right: env(safe-area-inset-right, 0px);
      bottom: env(safe-area-inset-bottom, 0px);
      background: #1a3d6e;
    }
    canvas {
      display: block;
    }
    /* Force landscape */
    @media (orientation: portrait) {
      #rotate-message {
        display: flex !important;
      }
    }
    #rotate-message {
      display: none;
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #1a3d6e; color: white;
      align-items: center; justify-content: center;
      font-family: sans-serif; font-size: 1.2rem; z-index: 9999;
      text-align: center; padding: 2rem;
    }
    /* Install banner */
    #install-banner {
      display: none;
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #1a3555; color: white; padding: 10px 16px;
      font-family: Arial, sans-serif; font-size: 14px;
      z-index: 10000; align-items: center; justify-content: center; gap: 12px;
    }
    #install-banner button {
      border: none; border-radius: 4px; padding: 6px 14px;
      font-size: 13px; cursor: pointer;
    }
    #install-banner .install-btn { background: #ffd700; color: #000; font-weight: bold; }
    #install-banner .dismiss-btn { background: transparent; color: #888; }
  </style>
</head>
<body>
  <div id="game-container"></div>
  <div id="rotate-message">Rotate your device to landscape to play</div>
  <div id="install-banner">
    <span>Install Pyrgo Soccer</span>
    <button class="install-btn" id="install-btn">Install</button>
    <button class="dismiss-btn" id="dismiss-btn">Not now</button>
  </div>
  <script>
    // Force SW update check on every page load (iOS PWA cache fix)
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(registrations => {
        registrations.forEach(reg => {
          reg.update();
        });
      });
    }
  </script>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
